# GitHub Actions: автоматическая сборка и деплой по push в main.
#
# Требуемые secrets:
#   SSH_HOST            — адрес сервера
#   SSH_PORT            — порт SSH (например 22)
#   SSH_USER            — пользователь
#   SSH_PRIVATE_KEY     — приватный SSH-ключ (PEM)
#   APP_DIR             — путь до приложения на сервере (например /opt/electro)
#   SERVICE_NAME        — имя systemd-сервиса (например electro)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm install --workspaces --include-workspace-root

      - name: Build client
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Backup data on server
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "bash -lc 'cd \"${APP_DIR}\" && node scripts/backup.js || true'"

      - name: Sync files to server
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='server/data/works.json' \
            --exclude='server/data/backups' \
            -e "ssh -p ${SSH_PORT}" \
            . "${SSH_USER}@${SSH_HOST}:${APP_DIR}/"

      - name: Install deps & restart service
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "bash -lc '
            set -euo pipefail
            cd \"${APP_DIR}\"
            npm install --workspaces --include-workspace-root --omit=dev

            # Регистрируем сервис, если ещё не установлен
            SERVICE_FILE=\"/etc/systemd/system/${SERVICE_NAME}.service\"
            if [ ! -f \"\$SERVICE_FILE\" ]; then
              echo \"==> Устанавливаем systemd unit ${SERVICE_NAME}\"
              sudo cp \"${APP_DIR}/scripts/electro.service\" \"\$SERVICE_FILE\"
              sudo sed -i \"s|WorkingDirectory=.*|WorkingDirectory=${APP_DIR}|\" \"\$SERVICE_FILE\"
              sudo sed -i \"s|User=.*|User=\$(whoami)|\" \"\$SERVICE_FILE\"
              sudo systemctl daemon-reload
            fi

            # Включаем автозапуск при загрузке сервера (идемпотентно)
            sudo systemctl enable \"${SERVICE_NAME}\"

            sudo systemctl restart \"${SERVICE_NAME}\"
            sudo systemctl status \"${SERVICE_NAME}\" --no-pager || true
          '"
